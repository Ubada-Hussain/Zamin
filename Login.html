<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Login</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <div class="page-shell">
        <header class="brand-header">
            <div class="brand-mark">Zamin</div>
        </header>

        <main class="login-hero">
            <section class="hero-copy">
                <p class="eyebrow">Find the Factory</p>
                <h1>For Your Next Batch.</h1>
                <p class="hero-text">Sign in to connect with factories, manage orders, and keep production moving.</p>
            </section>

            <section class="login-card">
                <div class="card-title-group">
                    <h2>Welcome Back</h2>
                    <p>Enter your details to access your account.</p>
                </div>

                <form class="login-form">
                    <label class="field-label">
                        Username
                        <input type="text" placeholder="Username" class="input-field">
                    </label>

                    <label class="field-label">
                        Password
                        <input type="password" placeholder="Password" class="input-field">
                    </label>

                    <button type="submit" class="login-button">LOG IN</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
