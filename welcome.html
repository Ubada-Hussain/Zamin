<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Find your Factory Partner</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #4a4a4a; 
            overflow-x: hidden; 
        }

        
        .page-wrapper {
    background-color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    width: 100%;
}

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative; 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
        }

        
        header {
            padding: 40px 0; 
            display: flex;
            justify-content: flex-start;
        }

        .logo {
            font-size: 3.2em;
            font-weight: 700;
            color: #d8c3a5;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Playfair Display', serif;
        }

        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding-bottom: 10vh; 
        }

        .split-content {
            display: flex;
            align-items: center; 
            justify-content: flex-start;
            gap: 60px;
        }

        .text-side {
            text-align: left;
            flex: 1;
        }

        .video-side {
            max-width: 250px; 
            width: 100%;
        }

        .video-side video {
            width: 100%;
            border-radius: 15px;
            display: block;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        h1 {
            font-size: clamp(2.5em, 5vw, 4.2em);
            color: #444;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        /* --- Buttons --- */
        .path-selection {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .path-btn {
            padding: 16px 35px;
            text-decoration: none;
            font-size: 1em;
            font-weight: 700;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .path-btn-buyer { 
            background: transparent; 
            color: #444; 
            border: none;
            padding-left: 0;
        }
        
        .path-btn-factory { 
            background: #4a4a4a; 
            color: #fff; 
            border: 2px solid #4a4a4a; 
        }

        .path-btn-factory:hover {
            background: #333;
            transform: translateY(-2px);
        }

        
        .social-proof {
            margin-top: 40px;
            color: #888;
            display: flex;
            gap: 15px;
            font-size: 0.9em;
        }

        @media (max-width: 992px) {
            .split-content {
                flex-direction: column-reverse;
                text-align: center;
                gap: 30px;
            }
            .text-side { text-align: center; }
            .path-selection { justify-content: center; }
            .social-proof { justify-content: center; }
            header { justify-content: center; }
            .main-content { padding-bottom: 0; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div class="container">
            
            <header>
                <div class="logo">Zamin</div>
            </header>
            
            <div class="main-content">
                <div class="split-content">
                    
                    <div class="text-side">
                        <section class="hero">
                            <h1>Find the Factory <br> For Your Next Batch.</h1>
                        </section>

                        <section class="path-selection">
                            <a href="#buyer" class="path-btn path-btn-buyer">I am a Buyer</a>
                            <a href="#factory" class="path-btn path-btn-factory">I am a Factory Owner</a>
                        </section>

                        <section class="social-proof">
                            <span>• T-shirts</span>
                            <span>• Polo-shirts</span>
                            <span>• Hoodies</span>
                        </section>
                    </div>

                    <div class="video-side">
                        <video autoplay muted loop playsinline>
                            <source src="/assets/welcome.mp4" type="video/mp4">
                        </video>
                    </div>

                </div>
            </div>

        </div> 
    </div> 
</body>
</html>
