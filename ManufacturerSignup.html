<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamin - Manufacturer Signup</title>
    <link rel="stylesheet" href="ManufacturerSignup.css">
</head>
<body>
    <div class="page-shell">
        <header class="brand-header">
            <div class="brand-mark">ZAMIN</div>
            <a class="back-link" href="index.html">Back to Welcome</a>
        </header>

        <main class="signup-layout">
            <section class="signup-intro">
                <p class="eyebrow">Manufacturer Signup</p>
                <h1>Join as a Manufacturer</h1>
                <p class="intro-text">Share your factory strengths so B2B buyers can discover your production capacity and specialization.</p>
            </section>

            <section class="signup-card">
                <form class="signup-form">
                    <div class="section-heading">Common Information</div>

                    <label class="field-label">
                        Full Name
                        <input type="text" placeholder="Full Name" required>
                    </label>

                    <label class="field-label">
                        Email Address
                        <input type="email" placeholder="Email Address" required>
                    </label>

                    <label class="field-label">
                        Phone Number (WhatsApp)
                        <input type="tel" placeholder="03XX-XXXXXXX" required>
                    </label>

                    <label class="field-label">
                        Password
                        <input type="password" placeholder="Create a password" required>
                    </label>

                    <div class="section-heading">Manufacturer Details</div>

                    <label class="field-label">
                        Factory / Business Name
                        <input type="text" placeholder="Factory or business name" required>
                    </label>

                    <label class="field-label">
                        Location (City)
                        <select required>
                            <option value="" disabled selected>Select City</option>
                            <option>Faisalabad</option>
                            <option>Lahore</option>
                            <option>Karachi</option>
                            <option>Multan</option>
                            <option>Islamabad</option>
                        </select>
                    </label>

                    <label class="field-label">
                        Primary Specialization
                        <select multiple size="4" required>
                            <option>Denim</option>
                            <option>Women's Lawn</option>
                            <option>Knitwear</option>
                            <option>Kidswear</option>
                            <option>Outerwear</option>
                        </select>
                    </label>

                    <label class="field-label">
                        Monthly Production Capacity
                        <select required>
                            <option value="" disabled selected>Select capacity range</option>
                            <option>500 - 1,000 units</option>
                            <option>1,000 - 5,000 units</option>
                            <option>5,000 - 10,000 units</option>
                            <option>10,000+ units</option>
                        </select>
                    </label>

                    <button type="submit" class="submit-button">Create Manufacturer Account</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
